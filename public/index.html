<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM Maestro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">UTM<span class="accent">Maestro</span></div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="generator">Generator</button>
      <button class="tab-btn" data-tab="registry">Registry</button>
      <button class="tab-btn" data-tab="dashboard">Dashboard</button>
    </nav>
  </header>

  <main>
    <!-- GENERATOR TAB -->
    <section id="tab-generator" class="tab-panel active">
      <div class="panel-inner">
        <form id="generator-form" autocomplete="off">
          <div class="form-row">
            <label for="destination_url">Destination URL <span class="required">*</span></label>
            <input type="url" id="destination_url" required>
          </div>
          <div class="form-row">
            <label for="source">Source <span class="required">*</span></label>
            <input type="text" id="source" list="source-list" required>
            <datalist id="source-list"></datalist>
          </div>
          <div class="form-row">
            <label for="medium">Medium <span class="required">*</span></label>
            <input type="text" id="medium" list="medium-list" required>
            <datalist id="medium-list"></datalist>
          </div>
          <div class="form-row">
            <label for="campaign">Campaign <span class="required">*</span></label>
            <input type="text" id="campaign" list="campaign-list" required>
            <datalist id="campaign-list"></datalist>
          </div>
          <div class="form-row">
            <label for="content">Content <span class="optional">(optional)</span></label>
            <input type="text" id="content">
          </div>
        </form>

        <div class="preview-box">
          <div class="preview-label">UTM URL Preview</div>
          <div id="utm-preview" class="preview-url">—</div>
          <div class="preview-actions">
            <button id="btn-copy" class="btn btn-secondary" disabled>Copy</button>
            <button id="btn-qr"   class="btn btn-secondary" disabled>QR ↓</button>
            <button id="btn-save" class="btn btn-primary"   disabled>Save</button>
          </div>
        </div>

        <div id="save-drawer" class="save-drawer hidden">
          <input type="text" id="created_by">
          <input type="text" id="save-note">
          <button id="btn-save-confirm" class="btn btn-primary">Confirm</button>
          <button id="btn-save-cancel" class="btn btn-ghost">Cancel</button>
        </div>

        <div id="generator-feedback" class="feedback hidden"></div>
      </div>
    </section>

    <!-- REGISTRY TAB -->
    <section id="tab-registry" class="tab-panel">
      <div class="panel-inner">
        <div class="toolbar">
          <input type="text"  id="filter-q"        class="search-input">
          <input type="text"  id="filter-campaign">
          <input type="text"  id="filter-source">
          <input type="text"  id="filter-medium" list="filter-medium-list">
          <datalist id="filter-medium-list"></datalist>
          <select id="filter-status">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="archived">Archived</option>
          </select>
          <input type="date" id="filter-from" title="From">
          <input type="date" id="filter-to"   title="To">
          <button id="btn-filter"     class="btn btn-secondary">Filter</button>
          <button id="btn-export-csv" class="btn btn-ghost">CSV ↓</button>
        </div>

        <div class="table-wrap">
          <table id="registry-table">
            <thead>
              <tr>
                <th>Date</th><th>Campaign</th><th>Source</th><th>Medium</th>
                <th>Destination</th><th>UTM URL</th><th>By</th><th>Note</th>
                <th>Status</th><th>Sessions</th><th>Conv.</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="registry-tbody"></tbody>
          </table>
        </div>
        <div id="registry-empty" class="empty-state hidden">No links found.</div>
      </div>
    </section>

    <!-- DASHBOARD TAB -->
    <section id="tab-dashboard" class="tab-panel">
      <div class="panel-inner">
        <div class="dashboard-toolbar">
          <div class="sub-tabs">
            <button class="sub-tab-btn active" data-subtab="campaigns">Campaigns</button>
            <button class="sub-tab-btn"        data-subtab="channels">Channels</button>
          </div>
          <select id="dash-range">
            <option value="7d">Last 7 days</option>
            <option value="30d" selected>Last 30 days</option>
            <option value="90d">Last 90 days</option>
          </select>
          <button id="btn-ga4-refresh" class="btn btn-secondary">Refresh GA4</button>
          <span id="ga4-timestamp" class="muted"></span>
        </div>

        <div id="subtab-campaigns" class="sub-tab-panel active">
          <div class="table-wrap">
            <table id="campaigns-table">
              <thead>
                <tr>
                  <th>Campaign</th><th>Source</th><th>Medium</th>
                  <th>Sessions</th><th>Users</th><th>Conversions</th><th>Conv. Rate</th>
                </tr>
              </thead>
              <tbody id="campaigns-tbody"></tbody>
            </table>
          </div>
          <div id="campaigns-empty" class="empty-state hidden">No GA4 data. Click "Refresh GA4".</div>
        </div>

        <div id="subtab-channels" class="sub-tab-panel hidden">
          <div class="chart-container">
            <canvas id="channels-chart"></canvas>
          </div>
        </div>

        <!-- Link Detail Modal -->
        <div id="link-detail-modal" class="modal hidden">
          <div class="modal-backdrop"></div>
          <div class="modal-box">
            <div class="modal-header">
              <span id="modal-title" class="modal-title"></span>
              <button id="modal-close" class="btn-icon" title="Close">✕</button>
            </div>
            <div class="modal-metrics">
              <div class="metric-card"><div class="metric-value" id="detail-sessions">—</div><div class="metric-label">Sessions</div></div>
              <div class="metric-card"><div class="metric-value" id="detail-conversions">—</div><div class="metric-label">Conversions</div></div>
              <div class="metric-card"><div class="metric-value" id="detail-bounce">—</div><div class="metric-label">Bounce Rate</div></div>
              <div class="metric-card"><div class="metric-value" id="detail-duration">—</div><div class="metric-label">Avg. Duration</div></div>
            </div>
            <div class="chart-container">
              <canvas id="detail-chart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script src="generator.js"></script>
  <script src="registry.js"></script>
  <script src="dashboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
